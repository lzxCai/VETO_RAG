<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <title>VETO | 卷宗载入节点</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000000; -webkit-font-smoothing: antialiased; }
        .mono { font-family: 'Fira Code', monospace; }

        /* 极致细线 */
        .b-fine { border: 1px solid #000; }
        .b-dashed { border: 1px dashed #000; }
        
        /* 上传区网格底纹 */
        .upload-grid {
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 拖拽悬停状态 */
        .drag-active { background-color: #000 !important; color: #fff !important; }
        .drag-active .upload-grid { background-image: none; }
        .drag-active .text-emerald-500 { color: #10b981; }

        /* 选项卡激活状态 */
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { background-color: #000; color: #fff; }

        /* 自定义复选框 */
        input[type="checkbox"] { appearance: none; width: 16px; height: 16px; border: 1px solid #000; cursor: pointer; position: relative; }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 10px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="h-20 px-8 flex justify-between items-center border-b border-black sticky top-0 bg-white z-50">
        <div class="flex items-center gap-2 cursor-pointer hover:opacity-50 transition-opacity" onclick="history.back()">
            <i class="fa-solid fa-arrow-left text-xl"></i>
            <span class="font-black text-sm tracking-[0.2em] ml-2 mt-0.5">返回中枢</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="mono text-[10px] text-emerald-500 tracking-widest">监听数据汇入_</span>
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col lg:flex-row">
        
        <div class="w-full lg:w-2/3 p-8 md:p-12 border-b lg:border-b-0 lg:border-r border-black flex flex-col">
            
            <div class="mb-10">
                <h1 class="text-5xl md:text-6xl font-black tracking-tighter leading-none">
                    卷宗<br>载入_
                </h1>
                <p class="mono text-xs text-zinc-500 mt-4 tracking-widest">>> 请选择挂载模式并载入目标协议</p>
            </div>

            <div class="flex border border-black mb-8">
                <button onclick="switchInput('file')" id="btn-file" class="tab-btn active flex-1 py-4 text-xs font-black tracking-[0.2em] border-r border-black hover:bg-black hover:text-white">
                    <i class="fa-solid fa-file-arrow-up mr-2"></i> 实体文件解析
                </button>
                <button onclick="switchInput('text')" id="btn-text" class="tab-btn flex-1 py-4 text-xs font-black tracking-[0.2em] hover:bg-black hover:text-white">
                    <i class="fa-solid fa-code mr-2"></i> 明文数据注入
                </button>
            </div>

            <div id="view-file" class="flex-grow flex flex-col">
                <div id="drop-zone" class="flex-grow b-dashed upload-grid bg-zinc-50 flex flex-col items-center justify-center p-12 cursor-pointer hover:border-emerald-500 transition-all group min-h-[300px]">
                    <div class="w-16 h-16 bg-black text-white flex items-center justify-center mb-6 group-hover:bg-emerald-500 group-hover:text-black transition-colors">
                        <i class="fa-solid fa-arrow-down text-2xl"></i>
                    </div>
                    <h3 class="text-2xl font-black tracking-tight mb-2">拖拽卷宗至此</h3>
                    <p class="text-sm font-medium text-zinc-500">或 <span class="text-black underline">点击浏览本地终端</span></p>
                    <div class="mt-8 flex gap-4 opacity-50">
                        <span class="mono text-[10px] border border-black px-2 py-1">[ PDF ]</span>
                        <span class="mono text-[10px] border border-black px-2 py-1">[ DOCX ]</span>
                        <span class="mono text-[10px] border border-black px-2 py-1">[ JPG ]</span>
                    </div>
                </div>
            </div>

            <div id="view-text" class="flex-grow hidden flex-col">
                <textarea class="flex-grow w-full b-fine p-6 mono text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors resize-none min-h-[300px]" placeholder=">> 在此释出协议原始数据流..."></textarea>
                <div class="flex justify-between items-center mt-2 px-2">
                    <span class="mono text-[10px] text-zinc-400">字符监测: 0</span>
                    <button class="mono text-[10px] font-bold underline hover:text-emerald-500">清空缓存_</button>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-1/3 bg-slate-50 p-8 md:p-12 flex flex-col">
            
            <h3 class="mono text-[10px] font-bold tracking-[0.3em] text-zinc-500 mb-8 border-b border-zinc-200 pb-4">>> 演算参数配置</h3>

            <div class="space-y-6 flex-grow">
                <label class="flex items-start gap-4 cursor-pointer group">
                    <input type="checkbox" checked class="mt-1">
                    <div>
                        <span class="block text-sm font-black tracking-widest group-hover:text-emerald-600 transition-colors">深层语义嗅探</span>
                        <span class="mono text-[9px] text-zinc-500">调用大语言模型排查隐性陷阱 [高耗能]</span>
                    </div>
                </label>
                
                <label class="flex items-start gap-4 cursor-pointer group">
                    <input type="checkbox" checked class="mt-1">
                    <div>
                        <span class="block text-sm font-black tracking-widest group-hover:text-emerald-600 transition-colors">霸王条款高亮</span>
                        <span class="mono text-[9px] text-zinc-500">强制标识所有免责与剥夺权利声明</span>
                    </div>
                </label>

                <label class="flex items-start gap-4 cursor-pointer group">
                    <input type="checkbox" class="mt-1">
                    <div>
                        <span class="block text-sm font-black tracking-widest group-hover:text-emerald-600 transition-colors">严格劳动法过滤</span>
                        <span class="mono text-[9px] text-zinc-500">仅套用《劳动合同法》专项规则匹配</span>
                    </div>
                </label>
            </div>

            <div class="mt-12">
                <div class="flex justify-between items-end mb-4 px-1">
                    <span class="mono text-[9px] tracking-widest text-zinc-500">引擎状态</span>
                    <span class="mono text-[10px] font-bold text-emerald-500">准允执行</span>
                </div>
                <button onclick="startScan()" id="btn-execute" class="w-full py-6 bg-black text-white text-xl font-black tracking-[0.2em] hover:bg-emerald-500 hover:text-black transition-all shadow-2xl relative overflow-hidden group">
                    <span class="relative z-10">执行解构_</span>
                    <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
                </button>
            </div>

        </div>
    </main>

    <script>
        // 1. 切换上传模式 (文件 vs 文本)
        function switchInput(mode) {
            const btnFile = document.getElementById('btn-file');
            const btnText = document.getElementById('btn-text');
            const viewFile = document.getElementById('view-file');
            const viewText = document.getElementById('view-text');

            if (mode === 'file') {
                btnFile.classList.add('active');
                btnText.classList.remove('active');
                viewFile.classList.replace('hidden', 'flex');
                viewText.classList.replace('flex', 'hidden');
            } else {
                btnText.classList.add('active');
                btnFile.classList.remove('active');
                viewText.classList.replace('hidden', 'flex');
                viewFile.classList.replace('flex', 'hidden');
            }
        }

        // 2. 模拟拖拽视觉效果
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-active');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-active');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            alert("系统提示: 卷宗挂载成功，等待执行解构。");
        });

        // 3. 模拟点击执行按钮的动效
        function startScan() {
            const btn = document.getElementById('btn-execute');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> 正在解构卷宗...';
            btn.classList.replace('bg-black', 'bg-zinc-800');
            btn.classList.add('pointer-events-none');

            // 模拟 2 秒后跳转到分析结果页
            setTimeout(() => {
                alert('系统提示：协议解析完成！即将生成风控报告。');
                
                // 恢复按钮状态（用于演示）
                btn.innerHTML = '<span class="relative z-10">执行解构_</span>';
                btn.classList.replace('bg-zinc-800', 'bg-black');
                btn.classList.remove('pointer-events-none');
            }, 2000);
        }
    </script>
</body>
</html>
